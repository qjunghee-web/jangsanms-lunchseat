<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>스마트 급식 지도</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Search = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
    const Armchair = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 9V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3"/><path d="M3 16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v1.5a2.5 2.5 0 0 1-2.5 2.5h-5A2.5 2.5 0 0 1 5 12.5V11a2 2 0 0 0-4 0z"/><path d="M5 18v2"/><path d="M19 18v2"/></svg>);
    const AlertTriangle = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
    const Upload = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
    const Users = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
    const UserX = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="23" y2="14"/><line x1="23" y1="8" x2="17" y2="14"/></svg>);
    const FileSpreadsheet = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/></svg>);
    const Trash2 = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>);
    const CheckCircle2 = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
    const ChevronDown = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>);
    const Plus = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>);
    const RefreshCw = ({ size = 24, className = '', strokeWidth = 2 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);

    // 지정여분좌석 및 휠체어 좌석 상수 정의
    const DESIGNATED_SPARES = [208, 209, 210, 235, 236, 237, 286, 287, 288, 310, 311, 312, 499, 500, 501, 502, 503, 504];
    const WHEELCHAIR_SEATS = [262, 263, 264];
    
    const SHIFT_INFO = [
      { id: '1차', title: '1차 급식', desc: '3학년 1~10반, 2학년 1~5반' },
      { id: '2차', title: '2차 급식', desc: '2학년 6~10반, 1학년 1~10반' }
    ];
    const INITIAL_DATA = [
      { 차시: '1차', 구역: '여', 학년: 3, 반: 1, 번호: 1, 이름: '김가은', 좌석번호: 265 },
      { 차시: '1차', 구역: '여', 학년: 3, 반: 1, 번호: 2, 이름: '김나라', 좌석번호: 266 },
      { 차시: '1차', 구역: '여', 학년: 3, 반: 1, 번호: 15, 이름: '', 좌석번호: 279 },
      { 차시: '1차', 구역: '남', 학년: 3, 반: 1, 번호: 21, 이름: '강동협', 좌석번호: 1 },
      { 차시: '2차', 구역: '남', 학년: 1, 반: 8, 번호: 33, 이름: '채희승', 좌석번호: 223 },
      { 차시: '2차', 구역: '남', 학년: '', 반: '', 번호: '', 이름: '여분좌석', 좌석번호: 225 },
      { 차시: '2차', 구역: '여', 학년: 1, 반: 9, 번호: 1, 이름: '강다연', 좌석번호: 470 },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('search');
      const [students, setStudents] = useState([]);
      const [penalties, setPenalties] = useState([]);
      const [isXlsxLoaded, setIsXlsxLoaded] = useState(false);

      useEffect(() => {
        const savedStudents = localStorage.getItem('lunchStudents');
        const savedPenalties = localStorage.getItem('lunchPenalties');
        
        if (savedStudents) setStudents(JSON.parse(savedStudents));
        else setStudents(INITIAL_DATA);

        if (savedPenalties) {
          const parsed = JSON.parse(savedPenalties);
          const merged = [];
          parsed.forEach(p => {
            const pId = p.id && p.id.toString().includes('-') ? p.id : `${p.학년}-${p.반}-${p.번호}`;
            const pDates = p.dates || (p.date ? [p.date] : []);
            const existing = merged.find(m => m.id === pId);
            if (existing) existing.dates = [...new Set([...existing.dates, ...pDates])].sort();
            else merged.push({ ...p, id: pId, dates: pDates });
          });
          setPenalties(merged);
        }

        const checkXLSX = setInterval(() => {
          if (window.XLSX) {
            setIsXlsxLoaded(true);
            clearInterval(checkXLSX);
          }
        }, 100);
      }, []);

      useEffect(() => {
        localStorage.setItem('lunchPenalties', JSON.stringify(penalties));
      }, [penalties]);

      const handleForceUpdate = () => {
        if(window.confirm('앱을 최신 버전으로 업데이트(새로고침) 하시겠습니까?\n(기존 데이터는 삭제되지 않습니다.)')) {
            window.location.replace(window.location.pathname + '?update=' + new Date().getTime());
        }
      };

      const Navigation = () => (
        <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around pb-safe z-30 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] rounded-t-3xl px-2">
          <NavButton icon={<Search />} label="검색" tabId="search" />
          <NavButton icon={<Armchair />} label="여분좌석" tabId="spare" />
          <NavButton icon={<AlertTriangle />} label="벌점관리" tabId="penalty" />
          <NavButton icon={<Upload />} label="데이터" tabId="data" />
        </div>
      );

      const NavButton = ({ icon, label, tabId }) => {
        const isActive = activeTab === tabId;
        return (
          <button onClick={() => setActiveTab(tabId)} className={`flex-1 flex flex-col items-center py-4 text-[11px] font-bold transition-all duration-300 whitespace-nowrap ${isActive ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
            <div className={`mb-1.5 transition-all duration-300 ${isActive ? 'scale-125 drop-shadow-md' : 'scale-100 opacity-80'}`}>
              {React.cloneElement(icon, { size: 22, strokeWidth: isActive ? 2.5 : 2 })}
            </div>
            {label}
          </button>
        );
      };

      return (
        <div className="max-w-md mx-auto bg-slate-50/50 min-h-screen shadow-2xl relative font-sans text-slate-800 break-keep">
          <header className="bg-gradient-to-r from-indigo-600 via-blue-600 to-indigo-700 text-white p-4 shadow-lg rounded-b-[2rem] sticky top-0 z-20 flex justify-between items-center px-5">
            <div className="w-[76px]"></div>
            <h1 className="text-xl font-extrabold flex items-center justify-center gap-2 tracking-tight">
              <Users size={26} className="opacity-90" /> 스마트 급식 지도
            </h1>
            <button onClick={handleForceUpdate} className="flex items-center gap-1 bg-white/20 hover:bg-white/30 active:scale-95 px-2.5 py-1.5 rounded-full transition-all shadow-sm border border-white/10" title="최신 버전으로 새로고침">
              <RefreshCw size={13} strokeWidth={2.5} />
              <span className="text-[11px] font-black tracking-tight pt-px">업데이트</span>
            </button>
          </header>

          <main className="p-5 pb-28 min-h-[calc(100vh-80px)]">
            {activeTab === 'search' && <SearchTab students={students} />}
            {activeTab === 'spare' && <SpareSeatsTab students={students} />}
            {activeTab === 'penalty' && <PenaltyTab students={students} penalties={penalties} setPenalties={setPenalties} />}
            {activeTab === 'data' && <DataTab setStudents={setStudents} isLoaded={isXlsxLoaded} />}
          </main>
          <Navigation />
        </div>
      );
    }

    // --- 1. 검색 탭 ---
    function SearchTab({ students }) {
      const [shift, setShift] = useState('1차');
      const [searchMode, setSearchMode] = useState('student');
      const [searchQuery, setSearchQuery] = useState('');
      const [result, setResult] = useState(null);

      const handleSearch = () => {
        if (!searchQuery.trim()) return setResult(null);

        if (searchMode === 'student') {
          const cleanQ = searchQuery.replace(/[^0-9]/g, '');
          let g, c, n, foundOverall = null;
          if (cleanQ.length >= 3 && cleanQ.length <= 5) {
            g = parseInt(cleanQ.substring(0, 1));
            if (cleanQ.length === 3) { c = parseInt(cleanQ.substring(1, 2)); n = parseInt(cleanQ.substring(2, 3)); } 
            else if (cleanQ.length === 4) { c = parseInt(cleanQ.substring(1, 3)) > 15 ? parseInt(cleanQ.substring(1, 2)) : parseInt(cleanQ.substring(1, 2)); n = parseInt(cleanQ.substring(cleanQ.length - 2)); } 
            else { c = parseInt(cleanQ.substring(1, 3)); n = parseInt(cleanQ.substring(3, 5)); }
            foundOverall = students.find(s => parseInt(s.학년) === g && parseInt(s.반) === c && parseInt(s.번호) === n);
          }

          if (foundOverall) {
            if (foundOverall.차시 === shift) setResult({ type: 'STUDENT_SUCCESS', data: foundOverall });
            else setResult({ type: 'WRONG_SHIFT', data: foundOverall });
          } else setResult({ type: 'NOT_FOUND' });
        } else {
          const seatNum = parseInt(searchQuery);
          const seatStudents = students.filter(s => parseInt(s.좌석번호) === seatNum);
          if (seatStudents.length > 0) {
            const student1 = seatStudents.find(s => s.차시 === '1차');
            const student2 = seatStudents.find(s => s.차시 === '2차');
            setResult({ type: 'SEAT_SUCCESS', data1: student1, data2: student2, seatNum });
          } else setResult({ type: 'NOT_FOUND' });
        }
      };

      const handleModeChange = (mode) => { setSearchMode(mode); setSearchQuery(''); setResult(null); };

      return (
        <div className="space-y-6 flex flex-col items-center w-full animate-in fade-in duration-500">
          <div className="flex bg-slate-200/70 p-1.5 rounded-2xl w-full gap-1 shadow-inner">
            <button onClick={() => handleModeChange('student')} className={`flex-1 py-3.5 text-[13px] sm:text-sm font-bold rounded-xl transition-all duration-300 whitespace-nowrap ${searchMode === 'student' ? 'bg-white text-indigo-700 shadow-md transform scale-[1.02]' : 'text-slate-500 hover:text-slate-700'}`}>학생 정보로 찾기</button>
            <button onClick={() => handleModeChange('seat')} className={`flex-1 py-3.5 text-[13px] sm:text-sm font-bold rounded-xl transition-all duration-300 whitespace-nowrap ${searchMode === 'seat' ? 'bg-white text-indigo-700 shadow-md transform scale-[1.02]' : 'text-slate-500 hover:text-slate-700'}`}>좌석 번호로 찾기</button>
          </div>

          {searchMode === 'student' && (
            <div className="flex bg-white/80 backdrop-blur-sm border border-slate-200 p-1.5 rounded-2xl w-full gap-1.5 shadow-sm">
              {SHIFT_INFO.map(s => (
                <button key={s.id} onClick={() => { setShift(s.id); setResult(null); }} className={`flex-1 py-3 flex flex-col items-center justify-center rounded-xl transition-all duration-300 ${shift === s.id ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'border border-transparent'}`}>
                  <span className={`text-[14px] sm:text-[15px] font-extrabold whitespace-nowrap mb-0.5 ${shift === s.id ? 'text-indigo-700' : 'text-slate-500'}`}>{s.title}</span>
                  <span className={`text-[10px] sm:text-[11px] leading-tight tracking-tight ${shift === s.id ? 'text-indigo-500 font-medium' : 'text-slate-400'}`}>{s.desc}</span>
                </button>
              ))}
            </div>
          )}

          <div className="relative w-full group">
            <input type={searchMode === 'seat' ? 'number' : 'text'} placeholder={searchMode === 'student' ? "학년 반 번호 입력 (예: 30115)" : "좌석 번호 입력 (예: 250)"} className="w-full pl-5 pr-14 py-4 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all text-lg font-bold shadow-sm placeholder:font-medium placeholder:text-slate-300" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} />
            <button onClick={handleSearch} className="absolute right-2 top-2 bottom-2 bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md active:scale-95 flex items-center justify-center"><Search size={22} strokeWidth={2.5} /></button>
          </div>

          <div className="w-full">
            {result?.type === 'NOT_FOUND' && (
              <div className="bg-rose-50 text-rose-600 p-6 rounded-3xl text-center flex flex-col items-center gap-3 border border-rose-100 shadow-sm animate-in zoom-in-95 duration-300">
                <div className="bg-rose-100 p-3 rounded-full"><UserX size={32} /></div><p className="font-bold text-[15px]">검색 결과가 없습니다.</p>
              </div>
            )}
            {result?.type === 'WRONG_SHIFT' && (
              <div className="bg-orange-50 p-6 rounded-3xl text-center flex flex-col items-center gap-3 border border-orange-200 shadow-sm animate-in zoom-in-95 duration-300">
                <div className="bg-orange-100 text-orange-600 p-3 rounded-full"><AlertTriangle size={32} /></div>
                <div className="space-y-1"><p className="font-medium text-orange-800 text-[15px] break-keep">해당 학생은 <span className="font-extrabold text-orange-600 text-lg mx-1">{shift}</span> 대상자가 아닙니다.</p><p className="text-[13px] text-orange-700 font-bold bg-orange-100/50 inline-block px-3 py-1 rounded-full mt-2">올바른 차시: {result.data.차시}</p></div>
              </div>
            )}
            {result?.type === 'STUDENT_SUCCESS' && (
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-lg border border-slate-100 animate-in slide-in-from-bottom-6 duration-500 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                <div className="flex justify-between items-end mb-2">
                  <div className="text-left">
                    <span className="bg-indigo-100 text-indigo-700 text-[11px] font-extrabold px-3 py-1.5 rounded-lg mb-3 inline-block shadow-sm tracking-wide">{result.data.차시} 급식</span>
                    {result.data.학년 ? (<><p className="text-[13px] font-bold text-slate-400 mb-0.5 whitespace-nowrap">{result.data.학년}학년 {result.data.반}반 {result.data.번호}번</p><p className="text-3xl font-black text-slate-800 tracking-tight whitespace-nowrap">{result.data.이름}</p></>) : (<><p className="text-[13px] font-bold text-slate-400 mb-0.5">배정 미상</p><p className="text-3xl font-black text-slate-800 tracking-tight whitespace-nowrap">이름 없음</p><p className="text-xs text-indigo-400 font-medium mt-1">여분좌석 추정</p></>)}
                  </div>
                  <div className="text-right flex flex-col items-end">
                    <div className={`w-24 h-24 rounded-2xl flex items-center justify-center text-4xl font-black text-white shadow-lg transform rotate-3 transition-transform hover:rotate-0 ${result.data.구역 === '남' ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-pink-400 to-rose-500'}`}>{result.data.좌석번호}</div>
                    <p className="text-[12px] font-extrabold text-slate-400 mt-3 bg-slate-100 px-3 py-1 rounded-lg whitespace-nowrap">{result.data.구역}학생 구역</p>
                  </div>
                </div>
              </div>
            )}
            {result?.type === 'SEAT_SUCCESS' && (
              <div className="w-full space-y-4 animate-in slide-in-from-bottom-6 duration-500">
                <div className="bg-slate-800 p-5 rounded-3xl shadow-lg text-center relative overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-r from-slate-800 to-slate-700"></div>
                  <div className="relative z-10"><p className="text-[13px] text-slate-300 font-bold mb-1 tracking-widest uppercase">조회한 좌석 번호</p><div className="text-5xl font-black text-white drop-shadow-md">{result.seatNum}</div></div>
                </div>
                <div className="grid grid-cols-2 gap-3 sm:gap-4">
                  <ShiftSeatCard shiftName="1차 급식" data={result.data1} />
                  <ShiftSeatCard shiftName="2차 급식" data={result.data2} />
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ShiftSeatCard({ shiftName, data }) {
      if (!data) return (<div className="bg-white border border-slate-100 p-5 rounded-3xl flex flex-col items-center justify-center text-center h-full min-h-[140px] shadow-sm"><span className="bg-slate-100 text-slate-500 text-[11px] font-extrabold px-3 py-1.5 rounded-lg mb-3 whitespace-nowrap">{shiftName}</span><p className="text-[13px] text-slate-400 font-bold break-keep">배정된<br/>학생 없음</p></div>);
      const isMale = data.구역 === '남';
      return (
        <div className={`p-5 rounded-3xl border flex flex-col items-center text-center shadow-md h-full transition-transform hover:-translate-y-1 ${isMale ? 'bg-gradient-to-b from-white to-blue-50 border-blue-100' : 'bg-gradient-to-b from-white to-pink-50 border-pink-100'}`}>
          <span className={`text-white text-[11px] font-extrabold px-3 py-1.5 rounded-lg shadow-sm mb-4 whitespace-nowrap ${isMale ? 'bg-blue-500' : 'bg-pink-500'}`}>{shiftName}</span>
          {data.학년 ? (<><p className="text-[11px] font-bold text-slate-500 mb-1 whitespace-nowrap">{data.학년}학년 {data.반}반 {data.번호}번</p><p className={`text-2xl font-black tracking-tight whitespace-nowrap ${isMale ? 'text-blue-800' : 'text-pink-800'}`}>{data.이름}</p></>) : (<><p className="text-lg font-black text-slate-700 mb-1 whitespace-nowrap">이름 없음</p><p className="text-[11px] text-slate-400 font-medium">(여분좌석)</p></>)}
          <p className="text-[10px] font-bold text-slate-400 mt-auto pt-4 whitespace-nowrap">{data.구역}학생 구역</p>
        </div>
      );
    }

    // --- 2. 여분 좌석 탭 ---
    function SpareSeatsTab({ students }) {
      const [shift, setShift] = useState('1차');
      
      const getSpareSeats = (zone) => {
        // 학생 데이터를 바탕으로 각 좌석이 남학생 구역인지 여학생 구역인지 파악
        const seatZones = {};
        students.forEach(s => {
          if (s.좌석번호 && s.구역) seatZones[parseInt(s.좌석번호)] = s.구역;
        });
        
        // 엑셀에 없는 좌석 번호일 경우의 기본 구역 (250번 이하: 남, 초과: 여)
        const getZone = (num) => seatZones[num] || (num <= 250 ? '남' : '여');

        // 1. 일반 학생 중 빈자리(여분) 추출
        const regularSpares = students.filter(s => 
          s.차시 === shift && 
          s.구역 === zone && 
          (!s.이름 || String(s.이름).trim() === '' || String(s.이름).includes('여분')) &&
          !DESIGNATED_SPARES.includes(parseInt(s.좌석번호)) &&
          !WHEELCHAIR_SEATS.includes(parseInt(s.좌석번호))
        ).map(s => parseInt(s.좌석번호));

        // 2. 지정여분좌석과 휠체어 좌석 (1, 2차 모두 무조건 노출되도록 필터링)
        const designated = DESIGNATED_SPARES.filter(num => getZone(num) === zone);
        const wheelchair = WHEELCHAIR_SEATS.filter(num => getZone(num) === zone);

        // 중복 제거 및 오름차순 정렬
        return Array.from(new Set([...regularSpares, ...designated, ...wheelchair])).sort((a, b) => a - b);
      };

      const maleSpares = getSpareSeats('남');
      const femaleSpares = getSpareSeats('여');

      const SeatBadge = ({ seatNum }) => {
        const isDesignated = DESIGNATED_SPARES.includes(seatNum);
        const isWheelchair = WHEELCHAIR_SEATS.includes(seatNum);

        let bgClass = 'bg-white border-slate-200 text-slate-700';
        let label = null;

        // 배경색 및 라벨 디자인 적용
        if (isWheelchair) {
          bgClass = 'bg-gradient-to-br from-pink-400 to-rose-500 border-rose-500 text-white shadow-md';
          label = <span className="text-[10px] italic mt-1 font-bold bg-black/20 px-2 py-0.5 rounded-full whitespace-nowrap">휠체어</span>;
        } else if (isDesignated) {
          bgClass = 'bg-gradient-to-br from-emerald-400 to-green-500 border-green-500 text-white shadow-md';
          label = <span className="text-[9px] italic mt-1 font-bold bg-black/20 px-1.5 py-0.5 rounded-full whitespace-nowrap tracking-tighter">1, 2차여분</span>;
        }

        return (
          <div className={`relative flex flex-col items-center justify-center p-4 rounded-2xl shadow-sm border transition-all hover:scale-105 ${bgClass}`}>
            <span className="text-2xl font-black">{seatNum}</span>
            {label}
          </div>
        );
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex bg-white/80 backdrop-blur-sm border border-slate-200 p-1.5 rounded-2xl w-full gap-1.5 shadow-sm">
            {SHIFT_INFO.map(s => (
              <button key={s.id} onClick={() => setShift(s.id)} className={`flex-1 py-3 flex flex-col items-center justify-center rounded-xl transition-all duration-300 ${shift === s.id ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'border border-transparent'}`}>
                <span className={`text-[14px] sm:text-[15px] font-extrabold whitespace-nowrap mb-0.5 ${shift === s.id ? 'text-indigo-700' : 'text-slate-500'}`}>{s.id} 여분</span><span className={`text-[10px] sm:text-[11px] leading-tight tracking-tight ${shift === s.id ? 'text-indigo-500 font-medium' : 'text-slate-400'}`}>{s.desc}</span>
              </button>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-gradient-to-b from-blue-50 to-white p-5 rounded-3xl border border-blue-100 shadow-sm"><h3 className="text-blue-800 font-extrabold mb-4 flex items-center gap-2 text-[15px] whitespace-nowrap"><span className="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block shadow-sm"></span> 남학생</h3><div className="grid grid-cols-2 gap-3">{maleSpares.map((seatNum, idx) => <SeatBadge key={`m-${idx}`} seatNum={seatNum} />)}{maleSpares.length === 0 && <p className="text-[12px] font-medium text-slate-400 col-span-2 py-4 text-center break-keep">여분 좌석이 없습니다.</p>}</div></div>
            <div className="bg-gradient-to-b from-pink-50 to-white p-5 rounded-3xl border border-pink-100 shadow-sm"><h3 className="text-pink-800 font-extrabold mb-4 flex items-center gap-2 text-[15px] whitespace-nowrap"><span className="w-2.5 h-2.5 rounded-full bg-pink-500 inline-block shadow-sm"></span> 여학생</h3><div className="grid grid-cols-2 gap-3">{femaleSpares.map((seatNum, idx) => <SeatBadge key={`f-${idx}`} seatNum={seatNum} />)}{femaleSpares.length === 0 && <p className="text-[12px] font-medium text-slate-400 col-span-2 py-4 text-center break-keep">여분 좌석이 없습니다.</p>}</div></div>
          </div>
        </div>
      );
    }

    // --- 3. 벌점 관리 탭 ---
    function PenaltyTab({ students, penalties, setPenalties }) {
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [grade, setGrade] = useState('');
      const [cls, setCls] = useState('');
      const [num, setNum] = useState('');
      const [feedback, setFeedback] = useState({ type: '', msg: '', id: null });

      useEffect(() => {
        if (grade && cls && num) {
          const student = students.find(s => parseInt(s.학년) === parseInt(grade) && parseInt(s.반) === parseInt(cls) && parseInt(s.번호) === parseInt(num));
          if (!student) { setFeedback({ type: 'error', msg: '해당 학생을 찾을 수 없습니다.', id: null }); setTimeout(() => setFeedback({ type: '', msg: '', id: null }), 3000); } 
          else {
            const studentId = `${grade}-${cls}-${num}`;
            const existingIndex = penalties.findIndex(p => p.id === studentId);
            if (existingIndex >= 0) { setFeedback({ type: 'error', msg: '이미 등록된 학생입니다. 아래 명단에서 클릭하여 날짜를 추가하세요.', id: null }); setTimeout(() => setFeedback({ type: '', msg: '', id: null }), 4000); } 
            else {
              const newPenalty = { id: studentId, 학년: grade, 반: cls, 번호: num, 이름: student.이름 || '이름없음', 좌석번호: student.좌석번호, dates: [date] };
              setPenalties(prev => [newPenalty, ...prev]);
              setFeedback({ type: 'success', msg: `${grade}학년 ${cls}반 ${num}번 (${student.이름 || '이름없음'}) 등록 완료!`, id: studentId });
            }
          }
          setGrade(''); setCls(''); setNum('');
        }
      }, [grade, cls, num, students, penalties, date, setPenalties]);

      const handleCardClick = (id) => { setPenalties(prev => prev.map(p => { if (p.id === id) { if (!p.dates.includes(date)) return { ...p, dates: [...p.dates, date].sort() }; else alert(`선택하신 날짜(${date})는 이미 기록되어 있습니다.`); } return p; })); };
      const handleRemoveDate = (e, id, targetDate) => { e.stopPropagation(); if(window.confirm(`해당 날짜(${targetDate})의 위반 기록을 삭제하시겠습니까?`)) { setPenalties(prev => prev.map(p => { if (p.id === id) return { ...p, dates: p.dates.filter(d => d !== targetDate) }; return p; })); } };
      const handleDeleteStudent = (e, id) => { e.stopPropagation(); if(window.confirm('이 학생의 모든 벌점 기록을 삭제하시겠습니까?')) { setPenalties(penalties.filter(p => p.id !== id)); } };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="bg-white p-6 sm:p-7 rounded-3xl shadow-lg border border-slate-100 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-rose-400 to-rose-600"></div>
            <h2 className="text-[17px] font-black text-slate-800 mb-5 flex items-center gap-2 whitespace-nowrap"><div className="bg-rose-100 text-rose-600 p-1.5 rounded-lg"><AlertTriangle size={20} strokeWidth={2.5}/></div> 위반자 등록</h2>
            <div className="space-y-5">
              <div><label className="block text-[12px] font-bold text-slate-500 mb-1.5 ml-1">위반 날짜 설정</label><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:border-rose-500 focus:ring-4 focus:ring-rose-500/20 outline-none transition-all font-semibold text-slate-700 cursor-pointer" /></div>
              <div className="grid grid-cols-3 gap-3">
                <div className="relative"><label className="block text-[12px] font-bold text-slate-500 mb-1.5 ml-1 text-center">학년</label><select value={grade} onChange={e=>setGrade(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-center text-lg font-bold focus:bg-white focus:border-rose-500 focus:ring-4 focus:ring-rose-500/20 outline-none transition-all appearance-none cursor-pointer text-slate-700"><option value="">선택</option>{[1,2,3].map(g => <option key={g} value={g}>{g}학년</option>)}</select><ChevronDown className="absolute right-2 bottom-4 text-slate-400 pointer-events-none" size={16}/></div>
                <div className="relative"><label className="block text-[12px] font-bold text-slate-500 mb-1.5 ml-1 text-center">반</label><select value={cls} onChange={e=>setCls(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-center text-lg font-bold focus:bg-white focus:border-rose-500 focus:ring-4 focus:ring-rose-500/20 outline-none transition-all appearance-none cursor-pointer text-slate-700"><option value="">선택</option>{Array.from({length: 10}, (_, i) => i + 1).map(c => <option key={c} value={c}>{c}반</option>)}</select><ChevronDown className="absolute right-2 bottom-4 text-slate-400 pointer-events-none" size={16}/></div>
                <div className="relative"><label className="block text-[12px] font-bold text-slate-500 mb-1.5 ml-1 text-center">번호</label><select value={num} onChange={e=>setNum(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-center text-lg font-bold focus:bg-white focus:border-rose-500 focus:ring-4 focus:ring-rose-500/20 outline-none transition-all appearance-none cursor-pointer text-slate-700"><option value="">선택</option>{Array.from({length: 40}, (_, i) => i + 1).map(n => <option key={n} value={n}>{n}번</option>)}</select><ChevronDown className="absolute right-2 bottom-4 text-slate-400 pointer-events-none" size={16}/></div>
              </div>
              {feedback.msg && (
                <div className={`flex justify-between items-center p-4 rounded-2xl border shadow-sm animate-in fade-in slide-in-from-top-2 ${feedback.type === 'error' ? 'bg-rose-50 border-rose-200' : 'bg-emerald-50 border-emerald-200'}`}>
                  <p className={`text-[13px] font-bold leading-tight flex-1 ${feedback.type === 'error' ? 'text-rose-600' : 'text-emerald-700'}`}>{feedback.msg}</p>
                  {feedback.type === 'success' && feedback.id && (<button onClick={() => { setPenalties(prev => prev.filter(p => p.id !== feedback.id)); setFeedback({ type: 'error', msg: '잘못된 등록이 삭제(취소)되었습니다.', id: null }); setTimeout(() => setFeedback({ type: '', msg: '', id: null }), 3000); }} className="bg-white text-rose-500 border border-rose-200 px-3 py-2 rounded-xl text-[12px] font-black hover:bg-rose-50 transition-colors shadow-sm whitespace-nowrap ml-3 shrink-0 active:scale-95 flex items-center gap-1.5"><Trash2 size={14} strokeWidth={2.5}/> 잘못 등록했나요?</button>)}
                </div>
              )}
            </div>
          </div>
          <div>
            <div className="flex justify-between items-end mb-4 px-2"><h3 className="text-[15px] font-black text-slate-700">누가 기록</h3><span className="text-[12px] font-bold text-slate-400 bg-slate-200/50 px-3 py-1 rounded-full whitespace-nowrap">총 {penalties.length}명</span></div>
            {penalties.length === 0 ? (<div className="bg-white/50 border border-slate-200 border-dashed rounded-3xl p-8 text-center text-slate-400 font-medium text-[13px]">등록된 위반 학생이 없습니다.</div>) : (
              <div className="space-y-3">
                {penalties.map(p => (
                  <div key={p.id} onClick={() => handleCardClick(p.id)} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col gap-3 transition-all hover:shadow-md hover:border-rose-300 cursor-pointer group">
                    <div className="flex justify-between items-start">
                      <div><p className="font-black text-slate-800 text-[16px] whitespace-nowrap mb-1">{p.학년}학년 {p.반}반 {p.번호}번 <span className="text-indigo-600 ml-1.5">{p.이름}</span></p><p className="text-[12px] text-slate-400 font-semibold whitespace-nowrap">원래 좌석: <span className="text-slate-600">{p.좌석번호}번</span></p></div>
                      <button onClick={(e) => handleDeleteStudent(e, p.id)} className="p-2.5 bg-slate-50 text-slate-400 hover:bg-rose-50 hover:text-rose-500 rounded-xl transition-colors shrink-0"><Trash2 size={18} strokeWidth={2.5}/></button>
                    </div>
                    <div className="flex flex-wrap gap-1.5 items-center bg-slate-50 p-3 rounded-2xl border border-transparent group-hover:border-rose-100 transition-colors">
                      <span className="text-[11px] font-extrabold text-slate-500 mr-1 flex items-center gap-1"><Plus size={12} className="text-rose-500 group-hover:scale-125 transition-transform" /> 누적 위반 ({p.dates.length}건)</span>
                      {p.dates.length === 0 && <span className="text-[11px] text-slate-400 italic">클릭하여 날짜 추가</span>}
                      {p.dates.map(d => (<span key={d} onClick={(e) => handleRemoveDate(e, p.id, d)} className="text-[11px] text-rose-600 font-extrabold bg-white border border-rose-200 px-2.5 py-1 rounded-lg shadow-sm flex items-center gap-1 hover:bg-rose-50 hover:border-rose-300 transition-colors cursor-pointer">{d}</span>))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 4. 데이터 관리 탭 ---
    function DataTab({ setStudents, isLoaded }) {
      const fileInputRef = useRef(null);
      const [status, setStatus] = useState('');

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!isLoaded || !window.XLSX) return setStatus('엑셀 처리 모듈 준비중입니다.');
        setStatus('파일을 분석하는 중입니다...');
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const workbook = window.XLSX.read(evt.target.result, { type: 'array' });
            const json = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
            if (json.length > 0 && json[0].hasOwnProperty('좌석번호')) {
              setStudents(json); localStorage.setItem('lunchStudents', JSON.stringify(json));
              setStatus(`성공적으로 업데이트 되었습니다! (총 ${json.length}명)`);
            } else setStatus('오류: 올바른 형식의 파일이 아닙니다.');
          } catch (err) { setStatus(`파일 읽기 오류: ${err.message}`); }
          if (fileInputRef.current) fileInputRef.current.value = '';
        };
        reader.readAsArrayBuffer(file);
      };

      const handleResetData = () => { if(window.confirm('데이터를 초기화하시겠습니까? (벌점은 유지됩니다)')) { setStudents(INITIAL_DATA); localStorage.setItem('lunchStudents', JSON.stringify(INITIAL_DATA)); setStatus('기본 데이터로 초기화되었습니다.'); } }

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="bg-white p-8 rounded-[2rem] shadow-lg border border-slate-100 text-center relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-bl-[100px] -z-0"></div>
            <div className="relative z-10">
              <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner"><FileSpreadsheet size={36} className="text-emerald-600" strokeWidth={2} /></div>
              <h2 className="text-[18px] font-black text-slate-800 mb-3 whitespace-nowrap">자리배치표 업데이트</h2>
              <p className="text-[13px] text-slate-500 mb-8 leading-relaxed font-medium break-keep">전출, 전입 등으로 변동이 생겼을 때<br/>새로운 엑셀(.xlsx) 파일을 업로드하세요.<br/><span className="text-indigo-500 font-bold bg-indigo-50 px-2 py-1 rounded-md mt-2 inline-block">데이터는 폰에만 안전하게 저장됩니다.</span></p>
              <input type="file" accept=".xlsx, .xls, .csv" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
              <button onClick={() => fileInputRef.current?.click()} className="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-black text-[15px] py-4 rounded-2xl flex justify-center items-center gap-2 shadow-md transition-all active:scale-95 whitespace-nowrap"><Upload size={22} strokeWidth={2.5}/> 새 엑셀 파일 업로드</button>
              {status && (<div className={`mt-5 p-4 rounded-2xl text-[13px] font-bold flex items-center justify-center gap-2 break-keep ${status.includes('성공') ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : status.includes('오류') ? 'bg-rose-50 text-rose-700 border border-rose-100' : 'bg-blue-50 text-blue-700 border border-blue-100'}`}>{status.includes('성공') && <CheckCircle2 size={18} />}{status}</div>)}
            </div>
          </div>
          <div className="text-center pb-4"><button onClick={handleResetData} className="text-[12px] font-bold text-slate-400 hover:text-slate-600 underline decoration-slate-300 underline-offset-4 transition-colors whitespace-nowrap">데모 데이터로 초기화</button></div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
